global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'movie-matcher-api'
    static_configs:
      - targets: ['host.docker.internal:8080']
    metrics_path: /metrics

  - job_name: 'recommendation-service'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
